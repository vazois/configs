# Garnet - Larger-than-Memory Cluster Configuration
# Placeholders: $eth1 (resolved per-node), $port (resolved per-instance)

--bind $eth1
--port $port
--cluster-enabled true
--checkpointdir /home/guser/garnet-cluster/checkpoints
--index-max-size 1g
--log-level info
--memory-size 16g
--page-size 1g
--segment-size 1g
