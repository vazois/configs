# Valkey/Redis - Larger-than-Memory Cluster Configuration
# Placeholders: $eth1 (resolved per-node), $port (resolved per-instance)

bind $eth1
port $port
protected-mode no
daemonize yes
logfile /home/guser/valkey-cluster/$port/valkey.log
dir /home/guser/valkey-cluster/$port

# Cluster
cluster-enabled yes
cluster-config-file nodes-$port.conf
cluster-node-timeout 5000

# Persistence (AOF + RDB)
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory-policy allkeys-lru

# Performance
io-threads 4
io-threads-do-reads yes
tcp-backlog 511
hz 100
