# Valkey/Redis - In-Memory Cluster Configuration
# Placeholders: $eth1 (resolved per-node), $port (resolved per-instance)

bind $eth1
port $port
protected-mode no
daemonize yes
logfile /home/guser/valkey-cluster/$port/valkey.log
dir /home/guser/valkey-cluster/$port

# Cluster
cluster-enabled yes
cluster-config-file nodes-$port.conf
cluster-node-timeout 5000

# Memory (no persistence)
save ""
appendonly no
maxmemory-policy allkeys-lru

# Performance
io-threads 6
io-threads-do-reads yes
tcp-backlog 16384
hz 100
